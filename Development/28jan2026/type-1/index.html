<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #root {
            height: 500px;
            width: 500px;
            background-color: blue;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #parent {
            height: 250px;
            width: 250px;
            background-color: red;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #child {
            height: 100px;
            width: 100px;
            background-color: yellow;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>

    <div id="root" onclick="handleRootClick()">
        <div id="parent" onclick="handleParentClick()">
            <div id="child" onclick="handleChildClick()">Click Me</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
