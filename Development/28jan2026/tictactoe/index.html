<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        main {
            display: grid;
            grid-template-columns: repeat(3, 200px);
            grid-template-rows: repeat(3, 200px);
        }

        main div {
            background-color: yellow;
            border: 1px solid chocolate;
        }
    </style>
</head>

<body>
    <main onClick="handleClick(event)">
        <div id="0,0"></div>
        <div id="0,1"></div>
        <div id="0,2"></div>
        <div id="1,0"></div>
        <div id="1,1"></div>
        <div id="1,2"></div>
        <div id="2,0"></div>
        <div id="2,1"></div>
        <div id="2,2"></div>
    </main>
    <script src="./script.js"></script>
</body>

</html>
