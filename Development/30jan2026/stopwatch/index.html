<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STOPWATCH</title>
  <style>
   * {
  box-sizing: border-box;
  font-family: "Segoe UI", system-ui, sans-serif;
}

body {
  height: 100vh;
  margin: 0;
  background: radial-gradient(circle at top, #1f2937, #020617);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 30px;
  color: #e5e7eb;
}

/* Stopwatch container */
.btn {
  background: linear-gradient(145deg, #0f172a, #020617);
  border-radius: 20px;
  padding: 25px;
  display: flex;
  gap: 20px;

  /* 3D depth */
  box-shadow:
    12px 12px 30px rgba(0, 0, 0, 0.8),
    -6px -6px 20px rgba(255, 255, 255, 0.05);
}

/* Time blocks */
.btnbtn {
  width: 90px;
  height: 90px;
  border-radius: 16px;

  display: flex;
  justify-content: center;
  align-items: center;

  font-size: 2rem;
  font-weight: 700;
  letter-spacing: 2px;

  background: linear-gradient(145deg, #020617, #0f172a);

  /* Inset 3D effect */
  box-shadow:
    inset 4px 4px 10px rgba(0, 0, 0, 0.9),
    inset -3px -3px 8px rgba(255, 255, 255, 0.08);

  color: #38bdf8;
}

/* Buttons container */
div:last-of-type {
  display: flex;
  gap: 15px;
}

/* Buttons */
button {
  padding: 12px 26px;
  border-radius: 12px;
  border: none;

  font-size: 1rem;
  font-weight: 600;
  letter-spacing: 1px;
  cursor: pointer;

  background: linear-gradient(145deg, #0ea5e9, #0284c7);
  color: #020617;

  /* 3D button */
  box-shadow:
    0 6px 0 #0369a1,
    0 10px 20px rgba(0, 0, 0, 0.6);

  transition: transform 0.1s ease, box-shadow 0.1s ease;
}

/* Button press */
button:active {
  transform: translateY(4px);
  box-shadow:
    0 2px 0 #0369a1,
    0 6px 12px rgba(0, 0, 0, 0.6);
}

/* Individual button colors */
#stop {
  background: linear-gradient(145deg, #ef4444, #b91c1c);
  box-shadow:
    0 6px 0 #7f1d1d,
    0 10px 20px rgba(0, 0, 0, 0.6);
}

#reset {
  background: linear-gradient(145deg, #22c55e, #15803d);
  box-shadow:
    0 6px 0 #166534,
    0 10px 20px rgba(0, 0, 0, 0.6);
}

  </style>
</head>
<body>
  <div class="btn">
    <div class ="btnbtn" id="hour">0</div>
    <div class ="btnbtn" id="minute">0</div>
    <div class ="btnbtn" id="second">0</div>
  </div>
  <div>
    <button id="start" >start</button> 
    <button id="stop">stop</button>
    <button id="reset" >reset</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
